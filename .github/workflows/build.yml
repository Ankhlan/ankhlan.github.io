name: Build site

# Runs on every push to main that touches sources. Uses the pre-built
# builder image (ghcr.io/<owner>/<repo>-builder:latest) so TeX Live and
# Python deps are already installed — no apt-get on every publish.
#
# The image itself is built by .github/workflows/build-image.yml whenever
# .github/Dockerfile or requirements.txt changes.

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'pages/**'
      - 'templates/**'
      - 'tools/**'
      - 'assets/**'
      - 'site.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: site-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ankhlan/ankhlan.github.io-builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Mark workspace safe for git
        # actions/checkout sets directory ownership to the runner user, but
        # the container runs as root. Tell git the directory is fine.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build site
        run: python3 tools/build.py

      - name: Commit generated HTML/SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no build outputs changed"
          else
            git commit -m "Build site [skip ci]"
            git push origin HEAD:main
          fi
