name: Build site

# Triggers on push of any source content (markdown, templates, tools, assets,
# config). The build runs python tools/build.py with TeX Live + Python deps,
# regenerates HTML/SVG outputs, commits them back with [skip ci], and lets
# Pages deploy from main as it does today.
#
# This enables "save from any browser via GitHub API" — once the source is
# committed (by a local push or by the desk editor's Save), the Action runs
# the same build pipeline and the published site updates.

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'pages/**'
      - 'templates/**'
      - 'tools/**'
      - 'assets/**'
      - 'site.yaml'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Cache TeX Live apt packages
        id: tex-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives/*.deb
          key: tex-apt-${{ runner.os }}-v1

      - name: Install TeX Live + dvisvgm
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures \
            texlive-fonts-recommended \
            dvisvgm
          which latex && latex --version | head -1
          which dvisvgm && dvisvgm --version | head -1

      - name: Build site
        run: python tools/build.py

      - name: Commit generated HTML/SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no build outputs changed"
          else
            git commit -m "Build site [skip ci]"
            git push origin HEAD:main
          fi
