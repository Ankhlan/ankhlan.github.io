name: Build builder image

# Builds .github/Dockerfile and pushes it to GHCR. Runs only when the
# Dockerfile or requirements.txt changes, plus manual trigger. The main
# build workflow consumes the image so day-to-day publishes don't reinstall
# TeX Live every run.

on:
  push:
    branches: [main]
    paths:
      - '.github/Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: builder-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LC}-builder" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:latest
            ${{ steps.tag.outputs.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.tag.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tag.outputs.image }}:buildcache,mode=max
