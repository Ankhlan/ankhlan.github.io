<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TikZJax minimal test</title>
  <link rel="stylesheet" href="https://tikzjax.com/v1/fonts.css">
  <script src="https://tikzjax.com/v1/tikzjax.js"></script>
</head>
<body>
  <h1>TikZJax minimal test (static script tag)</h1>
  <p>If TikZJax works at all, an SVG should render below within 5–30 seconds.</p>
  <div id="figure">
    <script type="text/tikz" data-show-console="true">
\begin{tikzpicture}
  \draw (0,0) circle (1);
  \draw (-1.5,0) -- (1.5,0);
  \draw (0,-1.5) -- (0,1.5);
\end{tikzpicture}
    </script>
  </div>
  <hr>
  <p id="status" style="font-family:monospace">page loaded at <span id="t"></span></p>
  <script>
    document.getElementById('t').textContent = new Date().toLocaleTimeString();
    setInterval(() => {
      const s = document.getElementById('status');
      const svgs = document.querySelectorAll('#figure svg').length;
      const tikzs = document.querySelectorAll('#figure script[type="text/tikz"]').length;
      s.textContent = `t=${new Date().toLocaleTimeString()}  svgs=${svgs}  pending=${tikzs}`;
    }, 1000);
  </script>
</body>
</html>
